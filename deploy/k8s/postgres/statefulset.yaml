apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: shopkuber
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      initContainers:
        - name: migrate
          image: migrate/migrate:v4.18.1
          args:
            - "-path=/migrations"
            - "-database=$(AUTH_DB_DSN)"
            - "up"
          env:
            - name: AUTH_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: shopkuber-secrets
                  key: AUTH_DB_DSN
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: shopkuber-secrets
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "shopkuber"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "shopkuber"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: migrations
          configMap:
            name: migrations-cm   # populated externally or via initJob
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
